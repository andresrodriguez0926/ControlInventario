<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug Store</title>
</head>
<body>
    <h1>Abra la consola (F12)</h1>
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/store.js"></script>
    <script>
        setTimeout(() => {
            if(!window.appStore) window.appStore = new Store();
            setTimeout(() => {
               const acts = window.appStore.getActividad(10000);
               const opsMap = {};
               acts.forEach(a => {
                   opsMap[a.operacion] = (opsMap[a.operacion]||0) + 1;
               });
               console.log('Operaciones registradas en Actividad: ', opsMap);

               // Let's run calculateWeeklyBalances locally
               // Assuming charts.js logic
               const rangeA = { start: new Date('2026-03-02T00:00:00.000Z'), end: new Date('2026-03-08T23:59:59.999Z') };
               
               let testStats = window.appStore.getStats();
               let cl = testStats.canastasLlenas;
               
               console.log('Balance actual llenas (antes de reversar):', cl);

               const recepciones = acts.filter(a => a.operacion.includes('Recepción'));
               console.log('Total Recepciones en BD:', recepciones.length);
               recepciones.slice(0, 50).forEach(r => {
                   console.log(`Rec: ${r.date || r.fecha} | Qty: ${r.cantidad}`);
               });
               
            }, 4000);
        }, 1000);
    </script>
</body>
</html>
